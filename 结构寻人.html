<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>结构寻人 · Structural Child Finder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:20px}
.header{text-align:center;padding:40px 0 30px}
.header h1{font-size:2em;background:linear-gradient(135deg,#6ee7b7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{color:#64748b;margin-top:8px;font-size:.9em}
.card{background:#13131f;border:1px solid #1e1e30;border-radius:16px;padding:28px;margin-bottom:20px}
.card h2{font-size:1.1em;color:#94a3b8;margin-bottom:20px;letter-spacing:.5px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid input,.form-grid select{background:#0a0a14;border:1px solid #2a2a3a;color:#e0e0e0;padding:12px 16px;border-radius:10px;font-size:1em;outline:none;transition:border-color .2s}
.form-grid input:focus,.form-grid select:focus{border-color:#3b82f6}
.form-grid .full{grid-column:1/-1}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;color:#fff;font-size:1.1em;font-weight:600;border-radius:12px;cursor:pointer;margin-top:20px;transition:opacity .2s,transform .1s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.result{display:none}
.result.show{display:block}
.pred-card{background:#0a0a14;border-left:3px solid #3b82f6;padding:16px 20px;margin-bottom:12px;border-radius:0 10px 10px 0}
.pred-card.p0{border-left-color:#ef4444}
.pred-card.p1{border-left-color:#f59e0b}
.pred-card.p2{border-left-color:#3b82f6}
.pred-card .priority{font-size:.8em;font-weight:700;margin-bottom:6px}
.p0 .priority{color:#ef4444}.p1 .priority{color:#f59e0b}.p2 .priority{color:#3b82f6}
.pred-card .text{font-size:.95em;line-height:1.5}
.pred-card .meta{color:#64748b;font-size:.82em;margin-top:6px}
.breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.break-item{background:#0a0a14;padding:14px;border-radius:10px;text-align:center}
.break-item .label{color:#64748b;font-size:.75em;margin-bottom:4px}
.break-item .value{font-size:1.1em;font-weight:600}
.actions{margin-top:16px}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #1e1e30;font-size:.9em}
.action-item:last-child{border:none}
.action-item .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dot.red{background:#ef4444}.dot.amber{background:#f59e0b}
.footer{text-align:center;color:#475569;font-size:.75em;padding:30px 0}
.warning{background:#1a0f0f;border:1px solid #3a1a1a;border-radius:10px;padding:14px;margin-top:16px;font-size:.82em;color:#fca5a5}
.warning strong{color:#f87171}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>结构寻人</h1>
<div class="sub">Structural Child Finder · 林小黑 架构</div>
</div>

<div class="card">
<h2>📋 输入寻人信息</h2>
<div class="form-grid">
<input type="text" id="name" placeholder="姓名" autocomplete="off">
<input type="number" id="age" placeholder="年龄" min="0" max="18">
<select id="gender" class="full"><option value="">性别</option><option value="男">男</option><option value="女">女</option></select>
<input type="text" id="location" class="full" placeholder="失踪地点（如：广州火车站 / 家门口 / XX商场）">
<input type="text" id="time" class="full" placeholder="失踪时间（如：2026-06-15 18:30）">
<input type="text" id="clothing" class="full" placeholder="衣着特征（如：红色校服 黑色运动鞋）">
</div>
<button class="btn" onclick="analyze()">⚡ 开始结构分析</button>
</div>

<div id="result" class="card result">
<h2>🔍 分析结果</h2>
<div class="breakdown" id="breakdown"></div>
<div id="predictions"></div>
<div id="actions" class="actions"></div>
<div id="warning" class="warning" style="display:none">
<strong>⚠️ 负责任的声明：</strong>本系统基于结构认知框架提供辅助预测，不能替代公安机关的全面搜索。所有预测仅供参考，实际搜救请以警方指挥为准。
</div>
</div>

<div class="footer">
Structural Cognition · 四公理框架 · v1.1
</div>
</div>

<script>
// ===== 引擎：名字拆解 =====
function parseName(name) {
    if (!name || name.length < 2) return {shell:'?', drive:'?', dark:'?'};
    const chars = [...name];
    return {shell:chars[0], drive:chars[1]||chars[0], dark:chars[chars.length-1]};
}

// ===== 引擎：环境分类 =====
const ENV = {
    '火车站':{mobility:10,vectors:'铁路沿线城市',risk:'跨省拐卖',speed:'快'},
    '汽车站':{mobility:8,vectors:'公路沿线',risk:'省内/邻省',speed:'中'},
    '商场':{mobility:4,vectors:'周边商业区',risk:'走失',speed:'慢'},
    '家门口':{mobility:2,vectors:'社区周边→向外',risk:'熟人/拐带',speed:'慢→中'},
    '学校':{mobility:3,vectors:'回家路线',risk:'离家出走/拐带',speed:'慢'},
    '广场':{mobility:5,vectors:'商圈/交通枢纽',risk:'走失/拐带',speed:'中'},
    '农村':{mobility:2,vectors:'村内→乡镇→县城',risk:'拐卖',speed:'慢'},
    '街道':{mobility:6,vectors:'沿街方向',risk:'走失/拐带',speed:'中'}
};

function classifyLocation(text) {
    for (let [k, v] of Object.entries(ENV)) {
        if (text.includes(k)) return {type:k, ...v};
    }
    return {type:'街道', ...ENV['街道']};
}

// ===== 引擎：年龄行为 =====
function ageProfile(age) {
    if (age <= 2) return {auto:0, speech:0, danger:0, label:'完全依附'};
    if (age <= 5) return {auto:3, speech:2, danger:1, label:'有限自主'};
    if (age <= 8) return {auto:5, speech:5, danger:2, label:'可自主移动'};
    if (age <= 12) return {auto:8, speech:8, danger:4, label:'高度自主'};
    if (age <= 16) return {auto:10, speech:10, danger:6, label:'接近成人'};
    return {auto:10, speech:10, danger:8, label:'成人'};
}

// ===== 引擎：方向预测 =====
function predict(env, profile, location) {
    const preds = [];
    const {mobility, vectors} = env;
    const autonomy = profile.auto;

    if (mobility >= 8) {
        preds.push({pri:'P0', text:`沿${vectors}方向跨省移动`,dist:'100-500km',window:'0-72h',focus:'主要铁路枢纽城市'});
    }
    if (mobility >= 3 && mobility < 8) {
        preds.push({pri:'P1', text:`失踪地周边${vectors}`,dist:'5-50km',window:'0-24h',focus:'商业区、交通枢纽、娱乐场所'});
    }
    if (autonomy < 3 && mobility >= 8) {
        preds.push({pri:'P0', text:'被拐带→人贩子向经济发达地区移动',dist:'>200km',window:'24-72h',focus:'沿海城市、大城市周边'});
    }
    if (autonomy <= 3 && mobility <= 4) {
        preds.push({pri:'P0', text:'熟人/近距离带走→社区周边向外辐射',dist:'0-30km',window:'0-24h',focus:'周边社区、村镇、熟人家、出租屋'});
    }
    if (autonomy >= 8) {
        preds.push({pri:'P1', text:'离家出走→去熟悉或向往的地方',dist:'10-100km',window:'0-48h',focus:'同学/朋友家、网吧、商业区'});
    }
    if (location.includes('农村')) {
        preds.push({pri:'P2', text:'沿乡镇→县城公路方向',dist:'5-30km',window:'0-48h',focus:'乡镇客运站、县城商业区'});
    }
    const rivers = ['河边','河岸','河堤','河道','河滩','河沟','河渠'];
    if (rivers.some(k=>location.includes(k)) || (location.includes('河')&&!location.includes('河北')&&!location.includes('河南'))) {
        preds.push({pri:'P0', text:'沿河下游方向',dist:'0-10km',window:'0-12h',focus:'下游河段、水闸、桥梁'});
    }
    return preds;
}

// ===== 引擎：紧急行动 =====
function urgentActions(env, profile, preds) {
    const acts = [];
    for (let p of preds.slice(0,2)) {
        if (p.pri === 'P0') acts.push({level:'red', text:`立即搜索：${p.focus}（${p.dist}范围）`});
    }
    if (profile.auto < 3) acts.push({level:'red', text:'调取失踪点周边所有监控（孩子无法自主移动）'});
    if (env.type === '火车站' || env.type === '汽车站') acts.push({level:'red', text:'联系站方广播寻人，调取购票记录和站内监控'});
    if (profile.label === '高度自主' || profile.label === '接近成人') acts.push({level:'amber', text:'联系同学/朋友/老师，查社交账号最后活动'});
    return acts;
}

// ===== 主函数 =====
function analyze() {
    const name = document.getElementById('name').value.trim();
    const age = parseInt(document.getElementById('age').value) || 5;
    const location = document.getElementById('location').value.trim() || '未知地点';
    const time = document.getElementById('time').value.trim() || '未知';
    const clothing = document.getElementById('clothing').value.trim();

    if (!name) return alert('请输入姓名');

    const layers = parseName(name);
    const env = classifyLocation(location);
    const profile = ageProfile(age);
    const preds = predict(env, profile, location);
    const acts = urgentActions(env, profile, preds);

    // 渲染
    document.getElementById('breakdown').innerHTML = `
        <div class="break-item"><div class="label">环境</div><div class="value">${env.type}</div></div>
        <div class="break-item"><div class="label">年龄行为</div><div class="value">${profile.label}</div></div>
        <div class="break-item"><div class="label">名字</div><div class="value">壳「${layers.shell}」驱「${layers.drive}」暗「${layers.dark}」</div></div>
    `;

    document.getElementById('predictions').innerHTML = '<h2 style="margin-bottom:12px">🗺️ 去向预测</h2>' +
        preds.map(p => `
            <div class="pred-card ${p.pri.toLowerCase()}">
                <div class="priority">${p.pri} · ${p.window}</div>
                <div class="text">${p.text}</div>
                <div class="meta">📏 ${p.dist} · 🎯 重点：${p.focus}</div>
            </div>
        `).join('');

    document.getElementById('actions').innerHTML = '<h2 style="margin-bottom:12px">🚨 紧急行动</h2>' +
        acts.map(a => `
            <div class="action-item">
                <div class="dot ${a.level}"></div>
                <div>${a.text}</div>
            </div>
        `).join('');

    document.getElementById('warning').style.display = 'block';
    document.getElementById('result').classList.add('show');
    document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
